<style>

 .toggle button.on{background:#1f6feb;color:#fff;font-weight:600}

 .pagemeta{margin-bottom:8px}

   linear-gradient(#f3f3f3 1px,transparent 1px) 0 0/100% 8.333%, #fcfcfc}
 .box{position:absolute;border:1px solid #bbb;border-left-width:5px;border-radius:6px;background:#fff;
   padding:5px 7px;overflow:hidden;cursor:pointer;font-size:11px;line-height:1.25;transition:box-shadow .1s}
 .box:hover,.box:focus{box-shadow:0 0 0 2px #1f6feb;outline:none;z-index:9999}
 .box.sel{box-shadow:0 0 0 3px #1f6feb}
 .box.decor{border-style:dashed;background:#f7f7f7;color:#888}
 .box .vtype{font-family:ui-monospace,Consolas,monospace;font-size:10px;color:#555;display:block}
 .box .vsum{color:#222;display:block;margin-top:2px;word-break:break-word}
 .box .ribbon{position:absolute;top:0;right:0;font-size:9px;font-weight:700;color:#fff;padding:1px 6px;border-bottom-left-radius:6px}

 #detail .lost{background:#fff0f0;border:1px solid #f3c0c0;border-radius:7px;padding:7px 10px}
 #detail .cost{background:#fff8e1;border:1px solid #ffe082;border-radius:7px;padding:7px 10px}
 #detail .empty{color:#999}
 .legend{display:flex;flex-wrap:wrap;gap:10px;padding:0 22px 18px;font-size:12px;color:#555}

 .note{margin:0 22px 18px;background:#eef4ff;border:1px solid #cfe0ff;border-radius:8px;padding:8px 12px;font-size:12px;color:#234}

lType": "card", "recommendedVisualType": "card", "metric": "# Goals per 90 Minutes", "message": "Goles por 90 minutos del equipo — eficiencia ofensiva normalizada.", "positionHint": {"col": 3, "row": 0, "colSpan": 3, "rowSpan": 2}, "justification": "Normalizar por minutos elimina el sesgo de equipos que juegan mas partidos. Metrica mas justa que el conteo bruto.", "framework": "Knaflic — metrica justa para la decision", "costWarning": ""}, {"visualId": "n44", "visualType": "card", "recommendedVisualType": "card", "metric": "# Goal Contributions per 90", "message": "Contribuciones totales (goles + asistencias) por 90 minutos.", "positionHint": {"col": 6, "row": 0, "colSpan": 3, "rowSpan": 2}, "justification": "Extiende la vision mas alla de los goles: los creadores de oportunidades tambien cuentan.", "framework": "Knaflic — contexto completo", "costWarning": ""}, {"visualId": "n45", "visualType": "card", "recommendedVisualType": "card", "metric": "# Avg Player Rating", "message": "Rating promedio del plantel — indicador de consistencia general.", "positionHint": {"col": 9, "row": 0, "colSpan": 3, "rowSpan": 2}, "justification": "Complementa los KPIs de goles/asistencias con una evaluacion global de rendimiento.", "framework": "Knaflic — contexto", "costWarning": "El rating_avg es una media de medias — interpretar con cuidado; comunicar la fuente al usuario."}, {"visualId": "n46", "visualType": "barChart", "recommendedVisualType": "barChart", "metric": "Top 10 jugadores por # Total Goal Contributions para la temporada seleccionada", "message": "Los creadores de juego mas importantes — goles + asistencias totales.", "positionHint": {"col": 0, "row": 2, "colSpan": 5, "rowSpan": 5}, "justification": "Ranking de 10: barras horizontales ordenadas por Goal Contributions. Barras apiladas (goles en azul / asistencias en gris) muestran el mix sin perder el orden.", "framework": "Knaflic — ranking con barras; parte-de-un-todo con 2 partes", "costWarning": "No separar en dos barras independientes por jugador: la barra apilada de 2 categorias es legible y mas compacta."}, {"visualId": "n47", "visualType": "table", "recommendedVisualType": "table", "metric": "player_name, appearances, goals, assists, minutes_played, goals_per_90, rating_avg — ordenado por goal_contributions desc", "message": "Estadisticas completas por jugador — soporte de detalle para la decision.", "positionHint": {"col": 5, "row": 2, "colSpan": 7, "rowSpan": 5}, "justification": "Tabla de detalle filtrable por jugador: responde 'dame los numeros exactos de X'. Formato condicional en goals_per_90 y rating_avg para guiar la vista. Columnas minimas (7), no una tabla gigante.", "framework": "Knaflic — valores exactos en tabla; Tufte — data-ink (sin bordes pesados)", "costWarning": "Limitar a 7 columnas. Una tabla de 15+ columnas es un antipatron (tabla gigante). El detalle adicional va en drillthrough."}]}]};
const INVENTORY = null;


const VERDICT_COLORS = {MANTENER:"#1a7f37",MODIFICAR:"#b35900",FUSIONAR:"#1f6feb",DEGRADAR:"#6e7781",ELIMINAR:"#b3261e"};
const VERDICT_LABEL = {MANTENER:"MANTENER",MODIFICAR:"MODIFICAR",FUSIONAR:"FUSIONAR",DEGRADAR:"DEGRADAR",ELIMINAR:"ELIMINAR"};
const CANVAS_W = 1280, CANVAS_H = 720;
const state = {page:0, view:"propuesto", selKey:null};

function el(tag, props, kids){
  const e = document.createElement(tag);
  if(props) for(const k in props){
    const v = props[k];
    if(k==="style") Object.assign(e.style, v);
    else if(k==="class") e.className = v;
    else if(k==="text") e.textContent = v;
    else if(k.slice(0,2)==="on") e.addEventListener(k.slice(2), v);
    else if(v!=null) e.setAttribute(k, v);
  }
  (kids||[]).forEach(c=>{ if(c==null) return; e.appendChild(typeof c==="object"?c:document.createTextNode(String(c))); });
  return e;
}

function invByPageId(){
  const m={};
  if(typeof INVENTORY==="object" && INVENTORY && INVENTORY.pages)
    INVENTORY.pages.forEach(p=>{ m[p.pageId]=p; });
  return m;
}
function proposalPages(){ return (PROPOSAL && PROPOSAL.pages) || []; }
function curPage(){ return proposalPages()[state.page] || {visuals:[]}; }

function verdictLookup(ppage){
  const m={};
  (ppage.visuals||[]).forEach(v=>{ if(v.refVisualId) m[v.refVisualId]=v; });
  return m;
}

function resolvePos(v, idx){
  const p = v.position;
  if(p && (Number(p.width)>0 || Number(p.height)>0))
    return {x:+p.x||0,y:+p.y||0,w:+p.width||0,h:+p.height||0,z:+p.z||idx};
  const h = v.positionHint;
  if(h) return {
    x:(+h.col||0)/12*CANVAS_W, y:(+h.row||0)*60,
    w:(+h.colSpan||3)/12*CANVAS_W, h:(+h.rowSpan||1)*60, z:idx};
  const col=idx%3, row=Math.floor(idx/3);
  return {x:col/3*CANVAS_W+18, y:row*176+18, w:CANVAS_W/3-36, h:150, z:idx};
}

function confText(c){
  if(c==null) return null;
  const n=+c; const w = n>=0.8?"alta":(n>=0.5?"media":"baja");
  return "Confianza "+w+" ("+n.toFixed(2)+")";
}

function makeBox(v, idx, opts){
  opts = opts||{};
  const pos = resolvePos(v, idx);
  const box = el("div", {class:"box"+(v.decorative?" decor":""), tabindex:"0"});
  box.style.left   = (pos.x/CANVAS_W*100)+"%";
  box.style.top    = (pos.y/CANVAS_H*100)+"%";
  box.style.width  = (pos.w/CANVAS_W*100)+"%";
  box.style.height = (pos.h/CANVAS_H*100)+"%";
  box.style.zIndex = pos.z||idx;
  const vtype = v.visualType || v.recommendedVisualType || (v.decorative?"(decorativo)":"(visual)");
  box.appendChild(el("span",{class:"vtype",text:vtype}));
  const sum = v.roleSummary || v.message || v.metric || "";
  if(sum) box.appendChild(el("span",{class:"vsum",text:sum}));
  if(opts.verdict){
    const c = VERDICT_COLORS[opts.verdict] || "#666";
    box.style.borderLeftColor = c;
    box.appendChild(el("span",{class:"ribbon",style:{background:c},text:VERDICT_LABEL[opts.verdict]||opts.verdict}));
  } else {
    box.style.borderLeftColor = "#1f6feb";
  }
  if(opts.selKey && opts.selKey===state.selKey) box.classList.add("sel");
  box.addEventListener("click", ()=>{ state.selKey=opts.selKey; render(); });
  box.addEventListener("keydown", e=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); state.selKey=opts.selKey; render(); }});
  return box;
}

function renderCanvas(){
  const canvas = el("div",{id:"canvas"});
  const ppage = curPage();
  const isRevisar = (MODE==="revisar");

  if(isRevisar && state.view==="actual"){
    const inv = invByPageId()[ppage.pageId];
    if(!inv || !inv.visuals || !inv.visuals.length){
      canvas.appendChild(el("div",{class:"empty",style:{position:"absolute",inset:"0",display:"flex",
        alignItems:"center",justifyContent:"center",color:"#999",fontSize:"13px",textAlign:"center",padding:"20px"},
        text:"Página nueva o sin equivalente actual — no hay estado previo que mostrar."}));
      return canvas;
    }
    const vl = verdictLookup(ppage);
    inv.visuals.forEach((v,i)=>{
      const prop = vl[v.visualId];
      const key = "actual:"+ppage.pageId+":"+v.visualId;
      canvas.appendChild(makeBox(v, i, {verdict: prop&&prop.verdict, selKey:key}));
    });
  } else {
    (ppage.visuals||[]).forEach((v,i)=>{
      const key = "prop:"+state.page+":"+(v.visualId||i);
      canvas.appendChild(makeBox(v, i, {verdict: isRevisar?v.verdict:null, selKey:key}));
    });
  }
  return canvas;
}

function detailRow(label, value, cls){
  if(value==null || value==="") return null;
  return el("div",{class:"row"+(cls?" "+cls:"")},[ el("span",{class:"lbl",text:label}), el("span",{text:value}) ]);
}

function renderDetail(){
  const d = el("aside",{id:"detail"});
  const ppage = curPage();
  const isRevisar = (MODE==="revisar");
  let v=null, verdict=null, fromActual=false;

  if(state.selKey){
    if(state.selKey.indexOf("actual:")===0){
      fromActual=true;
      const inv = invByPageId()[ppage.pageId];
      const vid = state.selKey.split(":").slice(2).join(":");
      v = (inv&&inv.visuals||[]).find(x=>x.visualId===vid) || null;
      verdict = verdictLookup(ppage)[vid] || null;
    } else {
      const i = +state.selKey.split(":")[1]===state.page ? state.selKey : null;
      v = (ppage.visuals||[]).find((x,idx)=>("prop:"+state.page+":"+(x.visualId||idx))===state.selKey) || null;
      verdict = v;
    }
  }

  if(!v){
    d.appendChild(el("h3",{text:"Detalle"}));
    d.appendChild(el("div",{class:"empty",text:"Selecciona un visual para ver su veredicto y el porqué."}));
    return d;
  }

  d.appendChild(el("h3",{text:(v.visualType||v.recommendedVisualType||"Visual")}));

  if(isRevisar){
    const vd = (verdict&&verdict.verdict) || (fromActual?null:v.verdict);
    if(vd){
      const c=VERDICT_COLORS[vd]||"#666";
      d.appendChild(el("span",{class:"pill",style:{background:c},text:VERDICT_LABEL[vd]||vd}));
    }
    const src = verdict || v;
    d.appendChild(detailRow("Campos", v.roleSummary));
    if(detailRow("Razón", src.reason)) d.appendChild(detailRow("Razón", src.reason));
    if(src.whatLost) d.appendChild(el("div",{class:"row lost"},[el("span",{class:"lbl",text:"Qué se pierde"}),el("span",{text:src.whatLost})]));
    const ct = confText(src.confidence); if(ct) d.appendChild(detailRow("Confianza", ct));
    if(src.framework) d.appendChild(detailRow("Marco", src.framework));
    if(src.mergeWith && src.mergeWith.length) d.appendChild(detailRow("Fusionar con", src.mergeWith.join(", ")));
  } else {
    d.appendChild(detailRow("Métrica", v.metric));
    d.appendChild(detailRow("Mensaje", v.message));
    d.appendChild(detailRow("Visual recomendado", v.recommendedVisualType||v.visualType));
    if(v.justification) d.appendChild(detailRow("Justificación", v.justification));
    if(v.framework) d.appendChild(detailRow("Marco", v.framework));
    if(v.costWarning) d.appendChild(el("div",{class:"row cost"},[el("span",{class:"lbl",text:"Costo / antipatrón"}),el("span",{text:v.costWarning})]));
  }
  return d;
}

function renderTabs(){
  const nav = el("nav",{id:"tabs"});
  proposalPages().forEach((p,i)=>{
    const label = p.title || p.displayName || ("Página "+(i+1));
    nav.appendChild(el("button",{class:(i===state.page?"on":""),text:label,
      onclick:()=>{ state.page=i; state.selKey=null; render(); }}));
  });
  return nav;
}

function renderHeader(){
  const rep = (PROPOSAL && PROPOSAL.report) || {};
  const h = el("header",{},[ el("h1",{text:rep.title||"Mockup de reporte"}) ]);
  if(rep.throughLine) h.appendChild(el("div",{class:"bajada",text:"Hilo conductor: "+rep.throughLine}));
  const bits=[]; if(rep.audience) bits.push("Audiencia: "+rep.audience); if(rep.framework) bits.push("Marco: "+rep.framework);
  if(bits.length) h.appendChild(el("div",{class:"meta",text:bits.join("  ·  ")}));
  if(MODE==="revisar"){
    const t = el("div",{class:"toggle"});
    t.appendChild(el("button",{class:(state.view==="actual"?"on":""),text:"Actual",onclick:()=>{state.view="actual";state.selKey=null;render();}}));
    t.appendChild(el("button",{class:(state.view==="propuesto"?"on":""),text:"Propuesto",onclick:()=>{state.view="propuesto";state.selKey=null;render();}}));
    h.appendChild(t);
  }
  return h;
}

function renderPageMeta(){
  const p = curPage();
  const m = el("div",{class:"pagemeta"});
  m.appendChild(el("div",{class:"title",text:(p.title||"Página "+(state.page+1)) + (MODE==="revisar"?("  —  "+(state.view==="actual"?"estado ACTUAL":"propuesta")):"")}));
  if(p.takeaway) m.appendChild(el("div",{class:"takeaway",text:"Takeaway: "+p.takeaway}));
  const sub=[]; if(p.audience) sub.push("Audiencia: "+p.audience); if(p.decision) sub.push("Decisión: "+p.decision);
  if(sub.length) m.appendChild(el("div",{class:"decision",text:sub.join("  ·  ")}));
  return m;
}

function renderLegend(){
  if(MODE!=="revisar") return null;
  const lg = el("div",{class:"legend"});
  Object.keys(VERDICT_COLORS).forEach(k=>{
    lg.appendChild(el("span",{},[ el("i",{style:{background:VERDICT_COLORS[k]}}), document.createTextNode(k) ]));
  });
  return lg;
}

function render(){
  const app = document.getElementById("app");
  app.textContent = "";
  app.appendChild(renderHeader());
  app.appendChild(renderTabs());
  const main = el("div",{class:"main"});
  const stage = el("div",{id:"stage"});
  stage.appendChild(renderPageMeta());
  stage.appendChild(renderCanvas());
  main.appendChild(stage);
  main.appendChild(renderDetail());
  app.appendChild(main);
  const lg = renderLegend(); if(lg) app.appendChild(lg);
  app.appendChild(el("div",{class:"note",text:"Wireframe esquemático (cajas etiquetadas, no a escala de píxeles). "
    +"Posiciones tomadas de las coordenadas reales 1280×720. Es un apoyo de asesoría, no el render real del reporte."}));
}

render();
</script></body></html>
