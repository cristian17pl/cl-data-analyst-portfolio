<!doctype html><html lang="es"><head><meta charset="utf-8">

<style>
 :root{color-scheme:light}
 *{box-sizing:border-box}
 html{background:#f4f5f7}
 body{font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:0;color:#1a1a1a;background:#f4f5f7}
 header{padding:16px 22px;border-bottom:1px solid #e0e0e0;background:#fff}

 .toggle{margin-top:10px;display:inline-flex;border:1px solid #ccc;border-radius:8px;overflow:hidden}

 .toggle button.on{background:#1f6feb;color:#fff;font-weight:600}

 nav#tabs button{border:1px solid #d0d0d0;background:#fff;border-radius:7px;padding:6px 12px;font-size:13px;cursor:pointer;color:#333}
 nav#tabs button.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
 .main{display:flex;gap:18px;padding:18px 22px;align-items:flex-start;flex-wrap:wrap}
 #stage{flex:1 1 620px;min-width:320px}
 .pagemeta{margin-bottom:8px}
 .pagemeta .title{font-size:16px;font-weight:600}
 .pagemeta .takeaway{font-size:14px;color:#1a1a1a;background:#fff8e1;border:1px solid #ffe082;border-radius:8px;padding:7px 12px;margin-top:6px}
 .pagemeta .decision{font-size:12px;color:#666;margin-top:4px}
 #canvas{position:relative;width:100%;max-width:1024px;aspect-ratio:1280/720;border:1px solid #0a1422;border-radius:6px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.18)}
 .visual{position:absolute;overflow:hidden;cursor:pointer;border-radius:6px}
 .visual svg{display:block;width:100%;height:100%}
 .visual:hover,.visual:focus{outline:2px solid #1f6feb;outline-offset:-1px;z-index:9999}
 .visual.sel{outline:3px solid #1f6feb;outline-offset:-1px}

 .chip{position:absolute;display:flex;align-items:center;gap:5px;font-size:11px;border-radius:6px;padding:3px 8px;cursor:pointer;z-index:50}
 .chip.slicer{background:#1E4A75;color:#C8A84B;border:1px solid #C8A84B}
 .chip.bm{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.5)}
 .chip.nav{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.4);font-weight:600}
 .chip .caret{opacity:.8}
 #detail{flex:0 0 330px;max-width:370px;border:1px solid #e0e0e0;border-radius:10px;padding:14px 16px;background:#fff;font-size:13px;position:sticky;top:14px}
 #detail h3{margin:0 0 8px;font-size:14px}
 #detail code{font-family:ui-monospace,Consolas,monospace;font-size:11px;background:#f0f2f5;padding:1px 4px;border-radius:3px}
 #detail .pill{display:inline-block;color:#fff;font-size:11px;font-weight:700;padding:2px 9px;border-radius:10px;margin-bottom:8px}
 #detail .row{margin:8px 0}
 #detail .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:#888;display:block;margin-bottom:2px}
 #detail .cost{background:#fff8e1;border:1px solid #ffe082;border-radius:7px;padding:7px 10px}
 #detail .bind{background:#eef4ff;border:1px solid #cfe0ff;border-radius:7px;padding:7px 10px;font-size:12px}
 #detail .empty{color:#999}
 .legend{display:flex;flex-wrap:wrap;gap:10px;padding:0 22px 10px;font-size:12px;color:#555}
 .legend span{display:inline-flex;align-items:center;gap:5px}
 .legend i{width:12px;height:12px;border-radius:3px;display:inline-block}
 .note{margin:8px 22px 18px;background:#eef4ff;border:1px solid #cfe0ff;border-radius:8px;padding:8px 12px;font-size:12px;color:#234}
</style></head><body>

ca correcta; IBCS — comparación sin distorsión", "costWarning": "", "binding": {"projections": [{"role": "Category", "kind": "Column", "entity": "dim_calendar", "property": "year", "displayName": "Año"}, {"role": "Y", "kind": "Measure", "entity": "formulas", "property": "# Avg Hours per Active Day", "displayName": "Hrs/Día Activo"}], "sort": [{"kind": "Column", "entity": "dim_calendar", "property": "year", "direction": "Ascending"}]}}, {"visualId": "p1n07", "visualType": "multiRowCard", "recommendedVisualType": "multiRowCard", "metric": "REF Top Artist + REF Top Track", "message": "El artista y canción más escuchados en el periodo seleccionado.", "positionHint": {"col": 8, "row": 7, "colSpan": 4, "rowSpan": 3}, "justification": "Contexto narrativo inmediato — el dato más personal y memorable del overview. Reacciona al slicer de año para revelar el 'artista del año'. El nombre concreto ancla la historia. (Knaflic — storytelling: lo concreto > lo abstracto)", "framework": "Knaflic — storytelling con lo concreto", "costWarning": "", "binding": {"projections": [{"role": "Values", "kind": "Measure", "entity": "formulas", "property": "REF Top Artist", "displayName": "Top Artista"}, {"role": "Values", "kind": "Measure", "entity": "formulas", "property": "REF Top Track", "displayName": "Top Canción"}]}}]}, {"pageId": null, "newPageIndex": 2, "title": "El Ritmo de Mi Día", "takeaway": "La escucha se concentra en tarde-noche entre semana; los domingos extienden el patrón hacia la madrugada.", "audience": "Portfolio viewer / self", "decision": "¿Tengo rituales musicales según la hora y el día? ¿El patrón de semana difiere del fin de semana?", "width": 1280, "height": 720, "interactivity": {"slicers": [{"field": "dim_calendar.year", "type": "between", "scope": "all_pages", "slot": "slicer_year", "displayName": "Año"}, {"field": "dim_calendar.week_type", "type": "dropdown", "scope": "page", "slot": "slicer_weektype", "displayName": "Tipo de Semana"}], "bookmarks": [{"name": "Días hábiles", "filter": "dim_calendar.week_type = 'Weekday'"}, {"name": "Fines de semana", "filter": "dim_calendar.week_type = 'Weekend'"}], "navigation": {"style": "top-bar", "showTitle": true}, "drillthrough": [], "tooltips": []}, "visuals": [{"visualId": "p2n01", "visualType": "cardVisual", "recommendedVisualType": "cardVisual", "metric": "# Avg Hours per Active Day", "message": "Intensidad media diaria de escucha.", "positionHint": {"col": 0, "row": 0, "colSpan": 4, "rowSpan": 1}, "justification": "KPI de contexto arriba-izquierda para anclar la lectura del heatmap. (BLUF)", "framework": "BLUF", "costWarning": ""}, {"visualId": "p2n02", "visualType": "cardVisual", "recommendedVisualType": "cardVisual", "metric": "# Streams per Active Day", "message": "Streams medios por día activo — frecuencia de inicio.", "positionHint": {"col": 4, "row": 0, "colSpan": 4, "rowSpan": 1}, "justification": "Segundo KPI de contexto. (BLUF)", "framework": "BLUF", "costWarning": ""}, {"visualId": "p2n03", "visualType": "cardVisual", "recommendedVisualType": "cardVisual", "metric": "REF Selected Date Range", "message": "Rango de fechas filtrado actualmente.", "positionHint": {"col": 8, "row": 0, "colSpan": 4, "rowSpan": 1}, "justification": "Texto de contexto del filtro activo para evitar ambigüedad. (Knaflic — contexto)", "framework": "Knaflic — contexto", "costWarning": ""}, {"visualId": "p2n04", "visualType": "pivotTable", "recommendedVisualType": "pivotTable", "metric": "# Total Hours Played × day_name (rows) × hour_label (columns)", "message": "Mapa de calor 7×24: revela rituales de escucha — commute matutino, tarde de trabajo, noche de ocio.", "positionHint": {"col": 0, "row": 1, "colSpan": 8, "rowSpan": 10}, "justification": "168 celdas (7 días × 24 horas) con formato condicional gradiente #121212→#1DB954 codifican la intensidad de escucha en cada bloque. Equivale a 168 mini-barras sin el ruido. Un solo vistazo revela patrones que ningún bar chart individual mostraría — el commute de las 8am, la siesta del mediodía, la sesión nocturna de las 11pm. Los bookmarks 'Días hábiles' vs 'Fin de semana' muestran si la rutina cambia. (Tufte — data-ink: máxima información por cm²; Gestalt — figura-fondo por intensidad; glance test — el patrón se lee en <5 segundos)", "framework": "Tufte — data-ink ratio; Gestalt — figura/fondo; glance test", "costWarning": "CRÍTICO: el formato condicional debe aplicarse POR COLUMNA (escala dentro de cada hora), NO por tabla entera — de lo contrario la hora con mayor volumen absoluto eclipsa todo lo demás. Considerar alternativa: escala por fila (por día) si el interés es comparar la distribución horaria dentro de cada día.", "binding": {"projections": [{"role": "Rows", "kind": "Column", "entity": "dim_calendar", "property": "day_name", "displayName": "Día"}, {"role": "Columns", "kind": "Column", "entity": "dim_time", "property": "hour_label", "displayName": "Hora"}, {"role": "Values", "kind": "Measure", "entity": "formulas", "property": "# Total Hours Played", "displayName": "Horas"}], "sort": [{"kind": "Column", "entity": "dim_calendar", "property": "day_of_week_number", "direction": "Ascending"}, {"kind": "Column", "entity": "dim_time", "property": "hour_sort", "direction": "Ascending"}]}}, {"visualId": "p2n05", "visualType": "hundredPercentStackedBarChart", "recommendedVisualType": "hundredPercentStackedBarChart", "metric": "# Total Hours Played × week_type × day_part", "message": "¿Cómo se reparte el día de escucha? — Semana vs. Fin de semana por momento del día.", "positionHint": {"col": 8, "row": 1, "colSpan": 4, "rowSpan": 5}, "justification": "100% apilado elimina el efecto de volumen (hay más días hábiles que de fin de semana) y muestra la composición real: ¿en semana predomina la mañana (commute) o la noche? Sin normalización, el día hábil siempre 'ganará' por volumen. (IBCS — normalización para comparación justa; Knaflic — parte-de-un-todo con pocas partes: 4 day_parts)", "framework": "IBCS — normalización; Knaflic — parte-de-un-todo", "costWarning": "", "binding": {"projections": [{"role": "Category", "kind": "Column", "entity": "dim_calendar", "property": "week_type", "displayName": "Tipo"}, {"role": "Series", "kind": "Column", "entity": "dim_time", "property": "day_part", "displayName": "Momento"}, {"role": "Y", "kind": "Measure", "entity": "formulas", "property": "# Total Hours Played", "displayName": "Horas"}]}}, {"visualId": "p2n06", "visualType": "barChart", "recommendedVisualType": "barChart", "metric": "# Total Hours Played × day_name", "message": "¿Qué día de la semana escucho más? — ranking de días.", "positionHint": {"col": 8, "row": 6, "colSpan": 4, "rowSpan": 5}, "justification": "Complementa el heatmap: si el lunes domina en volumen pero el domingo en patrón nocturno, la combinación cuenta la historia 'commute vs. ocio'. Horizontal porque las etiquetas de días son largas. Ordenado por día de la semana (no por valor) para mantener el orden natural de lectura. (Knaflic — comparar categorías → barras; Gestalt — proximidad con el 100% stacked arriba — mismo eje de decisión)", "framework": "Knaflic — comparar categorías; Gestalt — proximidad", "costWarning": "", "binding": {"projections": [{"role": "Category", "kind": "Column", "entity": "dim_calendar", "property": "day_name", "displayName": "Día"}, {"role": "Y", "kind": "Measure", "entity": "formulas", "property": "# Total Hours Played", "displayName": "Horas"}], "sort": [{"kind": "Column", "entity": "dim_calendar", "property": "day_of_week_number", "direction": "Ascending"}]}}]}, {"pageId": null, "newPageIndex": 3, "title": "Mi ADN de Escucha", "takeaway": "Los artistas más escuchados no son los más completados — hay dos universos distintos: escucha intencional y escucha de fondo.", "audience": "Portfolio viewer / self", "decision": "¿Cómo escucho? ¿Soy activo o pasivo? ¿En qué momento del día soy más impaciente con las canciones?", "width": 1280, "height": 720, "interactivity": {"slicers": [{"field": "dim_calendar.year", "type": "between", "scope": "all_pages", "slot": "slicer_year", "displayName": "Año"}], "bookmarks": [], "navigation": {"style": "top-bar", "showTitle": true}, "drillthrough": [{"targetPageId": null, "filterFields": ["dim_song_artist.master_metadata_album_artist_name"], "label": "Ver artista en detalle"}], "tooltips": [{"tooltipPageId": null, "appliesTo": ["p3n05"], "label": "Tooltip artista: streams + completion + horas totales"}]}, "visuals": [{"visualId": "p3n01", "visualType": "cardVisual", "recommendedVisualType": "cardVisual", "metric": "% Completion Rate", "message": "Tasa global de finalización de streams.", "positionHint": {"col": 0, "row": 0, "colSpan": 3, "rowSpan": 1}, "justification": "KPI header BLUF — el dato síntesis de la página. (BLUF)", "framework": "BLUF", "costWarning": ""}, {"visualId": "p3n02", "visualType": "cardVisual", "recommendedVisualType": "cardVisual", "metric": "% Skip Rate", "message": "Tasa global de skip.", "positionHint": {"col": 3, "row": 0, "colSpan": 3, "rowSpan": 1}, "justification": "KPI header. Junto a % Completion Rate da el cuadro completo: completion + skip no suman 100 porque hay streams terminados por otras razones. (BLUF; Knaflic — contexto)", "framework": "BLUF; Knaflic — contexto", "costWarning": ""}, {"visualId": "p3n03", "visualType": "cardVisual", "recommendedVisualType": "cardVisual", "metric": "% Shuffle Rate", "message": "Escucha en modo shuffle — proxy de escucha exploratoria vs. intencional.", "positionHint": {"col": 6, "row": 0, "colSpan": 3, "rowSpan": 1}, "justification": "KPI header. Alto shuffle = escucha exploratoria/pasiva. Bajo = playlists específicas o álbumes completos. (BLUF; Knaflic — contexto)", "framework": "BLUF; Knaflic — contexto", "costWarning": ""}, {"visualId": "p3n04", "visualType": "cardVisual", "recommendedVisualType": "cardVisual", "metric": "% Manual Start Rate", "message": "Streams iniciados manualmente — proxy de intención activa.", "positionHint": {"col": 9, "row": // deterministic 0..1 pseudo-random seeded by a string (no Math.random -> stable output)
function seedRand(str){
  let h=2166136261>>>0;
  for(let i=0;i<str.length;i++){ h^=str.charCodeAt(i); h=Math.imul(h,16777619)>>>0; }
  return ()=>{ h+=0x6D2B79F5; let t=h; t=Math.imul(t^(t>>>15),1|t); t^=t+Math.imul(t^(t>>>7),61|t); return ((t^(t>>>14))>>>0)/4294967296; };
}
function synthSeries(seed,n,lo,hi){ const r=seedRand(seed),a=[]; for(let i=0;i<n;i++) a.push(lo+(hi-lo)*r()); return a; }

function el(tag,props,kids){
  const e=document.createElement(tag);
  if(props) for(const k in props){ const v=props[k];
    if(k==="style") Object.assign(e.style,v);
    else if(k==="class") e.className=v;
    else if(k==="text") e.textContent=v;
    else if(k.slice(0,2)==="on") e.addEventListener(k.slice(2),v);
    else if(v!=null) e.setAttribute(k,v);
  }
  (kids||[]).forEach(c=>{ if(c==null) return; e.appendChild(typeof c==="object"?c:document.createTextNode(String(c))); });
  return e;
}
function sv(tag,attrs,kids){
  const e=document.createElementNS(SVGNS,tag);

  (kids||[]).forEach(c=>{ if(c!=null) e.appendChild(c); });
  return e;
}
function svText(s,attrs){ const t=sv("text",attrs); t.textContent=s; return t; } // textContent => safe

function resolvePos(v,idx){
  const p=v.position;
  if(p&&(+p.width>0||+p.height>0)) return {x:+p.x||0,y:+p.y||0,w:+p.width||0,h:+p.height||0,z:+p.z||idx};
  const h=v.positionHint;
  if(h) return {x:(+h.col||0)/12*CANVAS_W,y:(+h.row||0)*60,w:(+h.colSpan||3)/12*CANVAS_W,h:(+h.rowSpan||1)*60,z:idx};

  return {x:16+col*623,y:162+row*0,w:605,h:540,z:idx};
}

function drawCard(svg,w,h,v,pal){
  svg.appendChild(sv("rect",{x:0,y:0,width:w,height:h,rx:6,fill:pal.background}));
  svg.appendChild(sv("rect",{x:0,y:0,width:5,height:h,fill:pal.accent}));
  const label=vLabel(v), r=seedRand(v.visualId||label);
  const val=Math.round(10+r()*990);
  svg.appendChild(svText(label,{x:14,y:h*0.40,fill:pal.text,"font-size":Math.min(13,h*0.18),"font-family":"Segoe UI,Arial"}));
  svg.appendChild(svText(String(val),{x:14,y:h*0.82,fill:pal.text,"font-size":Math.min(34,h*0.46),"font-weight":"700","font-family":"Segoe UI,Arial"}));
}
function chartFrame(svg,w,h,v,pal){
  svg.appendChild(sv("rect",{x:0,y:0,width:w,height:h,rx:6,fill:pal.background,stroke:"rgba(255,255,255,.15)"}));
  svg.appendChild(svText(vLabel(v),{x:12,y:20,fill:pal.text,"font-size":13,"font-weight":"600","font-family":"Segoe UI,Arial"}));
  return {x0:14,y0:32,x1:w-14,y1:h-22};
}
function drawColumns(svg,w,h,v,pal,stacked){
  const a=chartFrame(svg,w,h,v,pal); const n=6, groups=stacked?3:2;
  const bw=(a.x1-a.x0)/n, gap=bw*0.18;
  for(let i=0;i<n;i++){
    const x=a.x0+i*bw+gap/2, bw2=bw-gap;
    if(stacked){
      let yacc=a.y1; const parts=synthSeries((v.visualId||"")+i,groups,.2,1);
      const tot=parts.reduce((s,x)=>s+x,0);
      parts.forEach((p,k)=>{ const ph=(a.y1-a.y0)*(p/tot); yacc-=ph;
        svg.appendChild(sv("rect",{x,y:yacc,width:bw2,height:ph,fill:pal.series[k%pal.series.length]})); });
    } else {
      const sw=bw2/groups, vals=synthSeries((v.visualId||"")+i,groups,.25,1);
      vals.forEach((val,k)=>{ const bh=(a.y1-a.y0)*val;
        svg.appendChild(sv("rect",{x:x+k*sw,y:a.y1-bh,width:sw-2,height:bh,fill:pal.series[k%pal.series.length]})); });
    }
  }
  svg.appendChild(sv("line",{x1:a.x0,y1:a.y1,x2:a.x1,y2:a.y1,stroke:"rgba(255,255,255,.3)"}));
}
function drawBars(svg,w,h,v,pal){
  const a=chartFrame(svg,w,h,v,pal); const n=7;
  const vals=synthSeries(v.visualId||"bars",n,.25,1).sort((x,y)=>y-x);
  const bh=(a.y1-a.y0)/n;
  vals.forEach((val,i)=>{ const y=a.y0+i*bh+bh*0.15, len=(a.x1-a.x0-60)*val;
    svg.appendChild(sv("rect",{x:a.x0+60,y,width:len,height:bh*0.7,fill:i===0?pal.accent:pal.series[0]}));
    svg.appendChild(svText("Item "+(i+1),{x:a.x0,y:y+bh*0.5,fill:pal.text,"font-size":9,"font-family":"Segoe UI,Arial"}));
  });
}
function drawLine(svg,w,h,v,pal){
  const a=chartFrame(svg,w,h,v,pal); const n=6;
  for(let s=0;s<2;s++){
    const vals=synthSeries((v.visualId||"line")+"_"+s,n,.2,1);
    const pts=vals.map((val,i)=>[a.x0+i*((a.x1-a.x0)/(n-1)), a.y1-(a.y1-a.y0)*val]);
    svg.appendChild(sv("polyline",{points:pts.map(p=>p[0]+","+p[1]).join(" "),fill:"none",
      stroke:pal.series[s%pal.series.length],"stroke-width":2.5}));
    pts.forEach(p=>svg.appendChild(sv("circle",{cx:p[0],cy:p[1],r:3,fill:pal.series[s%pal.series.length]})));
  }
  svg.appendChild(sv("line",{x1:a.x0,y1:a.y1,x2:a.x1,y2:a.y1,stroke:"rgba(255,255,255,.3)"}));
}
function drawTable(svg,w,h,v,pal){
  svg.appendChild(sv("rect",{x:0,y:0,width:w,height:h,rx:6,fill:pal.background,stroke:"rgba(255,255,255,.15)"}));
  svg.appendChild(svText(vLabel(v),{x:12,y:20,fill:pal.text,"font-size":13,"font-weight":"600","font-family":"Segoe UI,Arial"}));
  const cols=4, rows=Math.max(3,Math.min(8,Math.floor((h-40)/22))), x0=12, y0=32, cw=(w-24)/cols, rh=(h-40)/rows;
  svg.appendChild(sv("rect",{x:x0,y:y0,width:w-24,height:rh,fill:"rgba(255,255,255,.08)"}));
  for(let c=0;c<cols;c++) svg.appendChild(svText("Col "+(c+1),{x:x0+c*cw+4,y:y0+rh*0.7,fill:pal.accent,"font-size":10,"font-family":"Segoe UI,Arial"}));
  for(let rI=1;rI<rows;rI++){ const y=y0+rI*rh;
    svg.appendChild(sv("line",{x1:x0,y1:y,x2:w-12,y2:y,stroke:"rgba(255,255,255,.12)"}));
    for(let c=0;c<cols;c++) svg.appendChild(svText("·····",{x:x0+c*cw+4,y:y+rh*0.7,fill:pal.text,"font-size":10,"font-family":"Segoe UI,Arial"}));
  }
}
function drawGeneric(svg,w,h,v,pal){
  chartFrame(svg,w,h,v,pal);
  svg.appendChild(svText(vType(v)||"visual",{x:w/2,y:h/2,fill:"rgba(255,255,255,.5)","font-size":12,"text-anchor":"middle","font-family":"Segoe UI,Arial"}));
}
function renderVisualSVG(box,w,h,v,pal){
  const svg=sv("svg",{viewBox:"0 0 "+w+" "+h,preserveAspectRatio:"none"});
  const t=vType(v);
  if(t==="cardVisual"||t==="card"||t==="multiRowCard") drawCard(svg,w,h,v,pal);
  else if(t==="lineChart"||t==="areaChart") drawLine(svg,w,h,v,pal);
  else if(t==="barChart"||t==="stackedBarChart"||t==="hundredPercentStackedBarChart"||t==="clusteredBarChart") drawBars(svg,w,h,v,pal);
  else if(t==="clusteredColumnChart") drawColumns(svg,w,h,v,pal,false);
  else if(t==="columnChart"||t==="hundredPercentStackedColumnChart") drawColumns(svg,w,h,v,pal,true);
  else if(t==="tableEx"||t==="pivotTable") drawTable(svg,w,h,v,pal);
  else drawGeneric(svg,w,h,v,pal);
  box.appendChild(svg);
}

function makeVisual(v,idx,pal,opts){
  opts=opts||{};
  const pos=resolvePos(v,idx);
  const box=el("div",{class:"visual"+(opts.selKey===state.selKey?" sel":""),tabindex:"0"});
  box.style.left=(pos.x/CANVAS_W*100)+"%"; box.style.top=(pos.y/CANVAS_H*100)+"%";
  box.style.width=(pos.w/CANVAS_W*100)+"%"; box.style.height=(pos.h/CANVAS_H*100)+"%";
  box.style.zIndex=pos.z||idx;
  // render at the real pixel size for crisp proportions
  renderVisualSVG(box,Math.max(40,pos.w),Math.max(30,pos.h),v,pal);
  if(opts.verdict){ const c=VERDICT_COLORS[opts.verdict]||"#666";
    box.appendChild(el("span",{class:"ribbon",style:{background:c},text:opts.verdict})); }
  const act=()=>{ state.selKey=opts.selKey; render(); };
  box.addEventListener("click",act);
  box.addEventListener("keydown",e=>{ if(e.key==="Enter"||e.key===" "){e.preventDefault();act();} });
  return box;
}

function renderInteractivity(canvas,page,pal){
  const inter=page.interactivity||{};
  (inter.slicers||[]).forEach((sl,i)=>{
    const chip=el("div",{class:"chip slicer"},[ (sl.displayName||sl.field||"Slicer"),
      el("span",{class:"caret",text:"▾"}) ]);
    chip.style.right=(8+i*4)+"px"; chip.style.top="6px";
    if(sl.default) chip.title="Default: "+sl.default;
    canvas.appendChild(chip);
  });
  let bx=10;
  (inter.bookmarks||[]).forEach(bk=>{
    const chip=el("div",{class:"chip bm",text:bk.name||"Bookmark"});
    chip.style.left=bx+"px"; chip.style.top="6px"; bx+=Math.max(70,(bk.name||"").length*8+24);
    if(bk.filter) chip.title=bk.filter;
    canvas.appendChild(chip);
  });
  const nav=inter.navigation;
  if(nav&&nav.showTitle){
    const t=el("div",{class:"chip nav",text:page.title||"Page"}); t.style.left="10px"; t.style.bottom="8px";
    canvas.appendChild(t);
  }
}

function renderCanvas(){
  const pal=palette();
  const canvas=el("div",{id:"canvas"});
  canvas.style.background=pal.background;
  const ppage=curPage();
  const isRevisar=(MODE==="revisar");
  if(isRevisar&&state.view==="actual"){
    const inv=invByPageId()[ppage.pageId];
    if(!inv||!(inv.visuals||[]).length){
      canvas.appendChild(el("div",{style:{position:"absolute",inset:"0",display:"flex",alignItems:"center",
        justifyContent:"center",color:"rgba(255,255,255,.6)",fontSize:"13px",textAlign:"center",padding:"20px"},
        text:"Página nueva o sin equivalente actual — no hay estado previo que mostrar."}));
      return canvas;
    }
    inv.visuals.forEach((v,i)=>canvas.appendChild(makeVisual(v,i,pal,{selKey:"actual:"+ppage.pageId+":"+(v.visualId||i)})));
  } else {
    (ppage.visuals||[]).forEach((v,i)=>canvas.appendChild(
      makeVisual(v,i,pal,{verdict:isRevisar?v.verdict:null,selKey:"prop:"+state.page+":"+(v.visualId||i)})));
    renderInteractivity(canvas,ppage,pal);
  }
  return canvas;
}

function detailRow(label,value){
  if(value==null||value==="") return null;
  return el("div",{class:"row"},[el("span",{class:"lbl",text:label}),el("span",{text:value})]);
}
function renderDetail(){
  const d=el("aside",{id:"detail"});
  const ppage=curPage(), isRevisar=(MODE==="revisar");
  let v=null, fromActual=false;
  if(state.selKey){
    if(state.selKey.indexOf("actual:")===0){
      fromActual=true; const inv=invByPageId()[ppage.pageId];
      const vid=state.selKey.split(":").slice(2).join(":");
      v=((inv&&inv.visuals)||[]).find(x=>(x.visualId||"")==vid)||null;
    } else {
      v=(ppage.visuals||[]).find((x,idx)=>("prop:"+state.page+":"+(x.visualId||idx))===state.selKey)||null;
    }
  }
  if(!v){ d.appendChild(el("h3",{text:"Detalle"}));
    d.appendChild(el("div",{class:"empty",text:"Haz clic en un visual para ver el porqué."})); return d; }
  d.appendChild(el("h3",{text:vType(v)||"Visual"}));
  if(isRevisar&&v.verdict){ const c=VERDICT_COLORS[v.verdict]||"#666";
    d.appendChild(el("span",{class:"pill",style:{background:c},text:v.verdict})); }
  d.appendChild(detailRow("Métrica",v.metric));
  d.appendChild(detailRow("Mensaje",v.message||v.roleSummary));
  if(isRevisar){ d.appendChild(detailRow("Razón",v.reason)); d.appendChild(detailRow("Qué se pierde",v.whatLost)); }
  d.appendChild(detailRow("Justificación",v.justification));
  d.appendChild(detailRow("Marco",v.framework));
  if(v.costWarning) d.appendChild(el("div",{class:"row cost"},[el("span",{class:"lbl",text:"Costo / antipatrón"}),el("span",{text:v.costWarning})]));
  const b=v.binding;
  if(b&&b.projections){
    const lines=b.projections.map(p=>(p.role||"?")+": "+(p.entity||"")+"."+(p.property||"")+" ["+(p.kind||"Measure")+"]");
    d.appendChild(el("div",{class:"row bind"},[el("span",{class:"lbl",text:"Binding (build)"}),
      el("div",{},[document.createTextNode(lines.join("  •  "))])]));
  } else if(!fromActual){
    d.appendChild(el("div",{class:"row"},[el("span",{class:"lbl",text:"Binding (build)"}),
      el("span",{class:"empty",text:"sin binding — solo mockup (no se construye)"})]));
  }
  return d;
}

function renderTabs(){
  const nav=el("nav",{id:"tabs"});
  proposalPages().forEach((p,i)=>nav.appendChild(el("button",{class:(i===state.page?"on":""),
    text:p.title||p.displayName||("Página "+(i+1)),onclick:()=>{state.page=i;state.selKey=null;render();}})));
  return nav;
}
function renderHeader(){
  const rep=(PROPOSAL&&PROPOSAL.report)||{};
  const h=el("header",{},[el("h1",{text:rep.title||"Mockup de reporte"})]);
  if(rep.throughLine) h.appendChild(el("div",{class:"bajada",text:"Hilo conductor: "+rep.throughLine}));
  const bits=[]; if(rep.audience) bits.push("Audiencia: "+rep.audience); if(rep.framework) bits.push("Marco: "+rep.framework);
  if(bits.length) h.appendChild(el("div",{class:"meta",text:bits.join("  ·  ")}));
  if(MODE==="revisar"){
    const t=el("div",{class:"toggle"});
    t.appendChild(el("button",{class:(state.view==="actual"?"on":""),text:"Actual",onclick:()=>{state.view="actual";state.selKey=null;render();}}));
    t.appendChild(el("button",{class:(state.view==="propuesto"?"on":""),text:"Propuesto",onclick:()=>{state.view="propuesto";state.selKey=null;render();}}));
    h.appendChild(t);
  }
  return h;
}
function renderPageMeta(){
  const p=curPage(), m=el("div",{class:"pagemeta"});
  m.appendChild(el("div",{class:"title",text:(p.title||"Página "+(state.page+1))+(MODE==="revisar"?("  —  "+(state.view==="actual"?"estado ACTUAL":"propuesta")):"")}));
  if(p.takeaway) m.appendChild(el("div",{class:"takeaway",text:"Takeaway: "+p.takeaway}));
  const sub=[]; if(p.decision) sub.push("Decisión: "+p.decision);
  if(p.layoutPreset) sub.push("Layout: "+p.layoutPreset);
  if(sub.length) m.appendChild(el("div",{class:"decision",text:sub.join("  ·  ")}));
  return m;
}
function renderLegend(){
  if(MODE!=="revisar") return null;
  const lg=el("div",{class:"legend"});
  Object.keys(VERDICT_COLORS).forEach(k=>lg.appendChild(el("span",{},[el("i",{style:{background:VERDICT_COLORS[k]}}),document.createTextNode(k)])));
  return lg;
}
function render(){
  const app=document.getElementById("app"); app.textContent="";
  app.appendChild(renderHeader());
  app.appendChild(renderTabs());
  const main=el("div",{class:"main"});
  const stage=el("div",{id:"stage"});
  stage.appendChild(renderPageMeta());
  stage.appendChild(renderCanvas());
  main.appendChild(stage);
  main.appendChild(renderDetail());
  app.appendChild(main);
  const lg=renderLegend(); if(lg) app.appendChild(lg);
  app.appendChild(el("div",{class:"note",text:"Vista previa con datos SINTÉTICOS (formas y proporciones ilustrativas, "
    +"no valores reales) sobre coordenadas reales 1280×720. Es apoyo de diseño, no el render del reporte."}));
}
render();
</script></body></html>
