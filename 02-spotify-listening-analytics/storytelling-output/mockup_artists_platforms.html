<!doctype html><html lang="es"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Spotify — 9 Years of Listening</title>
<style>
 :root{color-scheme:light}
 *{box-sizing:border-box}
 html{background:#f4f5f7}
 body{font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:0;color:#1a1a1a;background:#f4f5f7}
 header{padding:16px 22px;border-bottom:1px solid #e0e0e0;background:#fff}
 header h1{font-size:19px;margin:0 0 4px}
 header .bajada{color:#444;font-size:14px;max-width:80ch}
 header .meta{color:#777;font-size:12px;margin-top:4px}
 .toggle{margin-top:10px;display:inline-flex;border:1px solid #ccc;border-radius:8px;overflow:hidden}
 .toggle button{border:0;background:#f5f5f5;padding:6px 16px;font-size:13px;cursor:pointer;color:#333}
 .toggle button.on{background:#1f6feb;color:#fff;font-weight:600}
 nav#tabs{display:flex;flex-wrap:wrap;gap:6px;padding:10px 22px;border-bottom:1px solid #eee;background:#fafafa}
 nav#tabs button{border:1px solid #d0d0d0;background:#fff;border-radius:7px;padding:6px 12px;font-size:13px;cursor:pointer;color:#333}
 nav#tabs button.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
 .main{display:flex;gap:18px;padding:18px 22px;align-items:flex-start;flex-wrap:wrap}
 #stage{flex:1 1 620px;min-width:320px}
 .pagemeta{margin-bottom:8px}
 .pagemeta .title{font-size:16px;font-weight:600}
 .pagemeta .takeaway{font-size:14px;color:#1a1a1a;background:#fff8e1;border:1px solid #ffe082;border-radius:8px;padding:7px 12px;margin-top:6px}
 .pagemeta .decision{font-size:12px;color:#666;margin-top:4px}
 #canvas{position:relative;width:100%;max-width:1024px;aspect-ratio:1280/720;border:1px solid #0a1422;border-radius:6px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.18)}
 .visual{position:absolute;overflow:hidden;cursor:pointer;border-radius:6px}
 .visual svg{display:block;width:100%;height:100%}
 .visual:hover,.visual:focus{outline:2px solid #1f6feb;outline-offset:-1px;z-index:9999}
 .visual.sel{outline:3px solid #1f6feb;outline-offset:-1px}
 .visual .ribbon{position:absolute;top:0;right:0;font-size:9px;font-weight:700;color:#fff;padding:1px 6px;border-bottom-left-radius:6px;z-index:5}
 .chip{position:absolute;display:flex;align-items:center;gap:5px;font-size:11px;border-radius:6px;padding:3px 8px;cursor:pointer;z-index:50}
 .chip.slicer{background:#1E4A75;color:#C8A84B;border:1px solid #C8A84B}
 .chip.bm{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.5)}
 .chip.bm.on{background:#1DB954;color:#0a1422;border-color:#1DB954;font-weight:700}
 .chip.nav{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.4);font-weight:600}
 .chip .caret{opacity:.8}
 #detail{flex:0 0 330px;max-width:370px;border:1px solid #e0e0e0;border-radius:10px;padding:14px 16px;background:#fff;font-size:13px;position:sticky;top:14px}
 #detail h3{margin:0 0 8px;font-size:14px}
 #detail code{font-family:ui-monospace,Consolas,monospace;font-size:11px;background:#f0f2f5;padding:1px 4px;border-radius:3px}
 #detail .pill{display:inline-block;color:#fff;font-size:11px;font-weight:700;padding:2px 9px;border-radius:10px;margin-bottom:8px}
 #detail .row{margin:8px 0}
 #detail .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:#888;display:block;margin-bottom:2px}
 #detail .cost{background:#fff8e1;border:1px solid #ffe082;border-radius:7px;padding:7px 10px}
 #detail .bind{background:#eef4ff;border:1px solid #cfe0ff;border-radius:7px;padding:7px 10px;font-size:12px}
 #detail .empty{color:#999}
 .legend{display:flex;flex-wrap:wrap;gap:10px;padding:0 22px 10px;font-size:12px;color:#555}
 .legend span{display:inline-flex;align-items:center;gap:5px}
 .legend i{width:12px;height:12px;border-radius:3px;display:inline-block}
 .note{margin:8px 22px 18px;background:#eef4ff;border:1px solid #cfe0ff;border-radius:8px;padding:8px 12px;font-size:12px;color:#234}
</style></head><body>

ab button — switches the page to artist grain.", "positionHint": {"col": 7, "row": 0, "colSpan": 1, "rowSpan": 1}, "justification": "First-class navigation control for the bookmark toggle, not decoration — without it the two parallel visual sets have no way to switch. Styled as a tab, default-selected state. (Knaflic — controls as part of the interface, not an afterthought)", "framework": "Knaflic — interface as part of the message", "costWarning": "Not built by the automated script (no binding/query — bookmark actions are wired in Desktop by design, to avoid authoring bookmark state blindly).", "bookmarkTarget": "Artists View"}, {"visualId": "p4btn02", "visualType": "actionButton", "recommendedVisualType": "actionButton", "metric": "Bookmark trigger: Albums View", "message": "Tab button — switches the page to album grain.", "positionHint": {"col": 8, "row": 0, "colSpan": 1, "rowSpan": 1}, "justification": "Second tab of the toggle pair. (Knaflic — interface as part of the message)", "framework": "Knaflic — interface as part of the message", "costWarning": "Not built by the automated script — wire to the 'Albums View' bookmark in Desktop.", "bookmarkTarget": "Albums View"}, {"visualId": "p4n01", "visualType": "lineChart", "recommendedVisualType": "lineChart", "metric": "# Total Hours Played × year × artist", "message": "Artist ranking evolution year by year, bump-chart style: who climbed, who fell, who appeared out of nowhere.", "bookmarkGroup": "p4-artist-grain", "positionHint": {"col": 0, "row": 1, "colSpan": 12, "rowSpan": 5}, "justification": "REVISED from ribbonChart after user feedback: with an ~3,000-artist catalogue, a ribbon chart implies visual continuity across a field that is mostly one-off long tail — most bands would appear for a single year then vanish, turning 'ranking evolution' into noise rather than a story. A multi-series line chart restricted to the top 8 by hours (a 'bump chart', per Knaflic's slopegraph/rank-chart pattern) scales cleanly regar , "entity": "formulas", "property": "# Streams", "direction": "Descending"}]}}, {"visualId": "p4n06", "visualType": "tableEx", "recommendedVisualType": "tableEx", "metric": "album + artist + # Streams + # Total Hours Played + % Completion Rate", "message": "The albums that marked me most: volume + real commitment, at album grain.", "bookmarkGroup": "p4-album-grain", "positionHint": {"col": 5, "row": 6, "colSpan": 7, "rowSpan": 6}, "justification": "Same position as p4n03, toggled by bookmark. Swaps '# Avg Minutes per Stream' (a track-grain insight) for '# Total Hours Played' (a volume insight that matters more once you're looking at a whole album) — the column set is deliberately different, not a copy-paste, because the right metric changes with the grain. (Knaflic — the right metric per grain, not the same metric everywhere)", "framework": "Knaflic — right metric per grain; Tufte — conditional formatting as data", "costWarning": "Maximum 5 columns and top 20 rows, same as p4n03.", "binding": {"projections": [{"role": "Values", "kind": "Column", "entity": "dim_song_artist", "property": "master_metadata_album_album_name", "displayName": "Album"}, {"role": "Values", "kind": "Column", "entity": "dim_song_artist", "property": "master_metadata_album_artist_name", "displayName": "Artist"}, {"role": "Values", "kind": "Measure", "entity": "formulas", "property": "# Streams", "displayName": "Streams"}, {"role": "Values", "kind": "Measure", "entity": "formulas", "property": "# Total Hours Played", "displayName": "Hours"}, {"role": "Values", "kind": "Measure", "entity": "formulas", "property": "% Completion Rate", "displayName": "% Completed"}], "sort": [{"kind": "Measure", "entity": "formulas", "property": "# Streams", "direction": "Descending"}]}}]}, {"pageId": "e5f6a7b8c9d0e1f2a3b4", "newPageIndex": 5, "title": "Platforms & Context", "takeaway": "Platform migration is visible year by year — each shift reflects a change in my life.", "audience": "Portfolio viewer / self", "decision": "Which devices do I listen on and how has that changed over time? When do I listen offline?", "width": 1280, "height": 720, "interactivity": {"slicers": [{"field": "dim_calendar.year", "type": "between", "scope": "all_pages", "slot": "slicer_year", "displayName": "Year", "positionHint": {"col": 10, "row": 0, "colSpan": 2, "rowSpan": 1}}], "bookmarks": [], "navigation": {"style": "top-bar", "showTitle": true}, "drillthrough": [], "tooltips": [], "designNote": "Dropped the page-scope 'device_type' slicer that shipped in the first build: it sat on the same page as p5n07, a chart whose entire Category axis IS device_type. Slicing to one device type collapses that chart to a single 100%-colored bar — the control defeats the exact visual it's meant to complement (Tufte — a control that destroys its own page's content is worse than no control). Native cross-filtering (click a bar in p5n07 to filter the rest of the page) covers the same interaction for free."}, "visuals": [{"visualId": "p5n01", "visualType": "cardVisual", "recommendedVisualType": "cardVisual", "metric": "% Offline Rate", "message": "Percentage of streams played offline.", "positionHint": {"col": 0, "row": 1, "colSpan": 3, "rowSpan": 2}, "justification": "BLUF header KPI — the most personal platform-context fact: offline = travel, flight, low coverage zone. (BLUF)", "framework": "BLUF", "costWarning": "", "binding": {"projections": [{"role": "Data", "kind": "Measure", "entity": "formulas", "property": "% Offline Rate", "displayName": "Offline Rate"}]}}, {"visualId": "p5n02", "visualType": "cardVisual", "recommendedVisualType": "cardVisual", "metric": "% Private Session Rate", "message": "Streams in incognito mode — social context of listening.", "positionHint": {"col": 3, "row": 1, "colSpan": 3, "rowSpan": 2}, "justification": "Header KPI. A high private session rate may reveal listening to things 'I don't want Spotify to recommend'. Interesting behavioural data point for the portfolio. (BLUF; Knaflic — concrete > abstract)", "framework": "BLUF; Knaflic — the personal > the abstract", "costWarning": "", "binding": {"projections": [{"role": "Data", "kind": "Measure", "entity": "formulas", "property": "% Private Session Rate", "displayName": "Private Session Rate"}]}}, {"visualId": "p5n03", "visualType": "cardVisual", "recommendedVisualType": "cardVisual", "metric": "# Countries Streamed From", "message": "Distinct connection countries — a proxy for travel and relocations over 9 years.", "positionHint": {"col": 6, "row": 1, "colSpan": 3, "rowSpan": 2}, "justification": "A deceptively simple number that can reveal years of travel or relocations. If 5+, the audience wonders 'where?'. (Knaflic — concrete anchors the story)", "framework": "Knaflic — concrete detail anchors the story", "costWarning": "", "binding": {"projections": [{"role": "Data", "kind": "Measure", "entity": "formulas", "property": "# Countries Streamed From", "displayName": "Countries"}]}}, {"visualId": "p5n04", "visualType": "cardVisual", "recommendedVisualType": "cardVisual", "metric": "# Platform Groups Used", "message": "Distinct platform groups used — ecosystem diversity.", "positionHint": {"col": 9, "row": 1, "colSpan": 3, "rowSpan": 2}, "justification": "KPI of ecosystem diversity. (BLUF)", "framework": "BLUF", "costWarning": "", "binding": {"projections": [{"role": "Data", "kind": "Measure", "entity": "formulas", "property": "# Platform Groups Used", "displayName": "Platform Groups"}]}}, {"visualId": "p5n05", "visualType": "hundredPercentStackedBarChart", "recommendedVisualType": "hundredPercentStackedBarChart", "metric": "# Total Hours Played × year × platform_group", "message": "Platform migration year by year: each bar = 100% of that year, coloured by device.", "positionHint": {"col": 0, "row": 3, "colSpan": 7, "rowSpan": 9}, "justification": "100% stacked horizontal removes the volume bias (some years have more streams than others) and shows the COMPOSITION: when did I migrate from Android to iOS? When did Smart TV or PlayStation appear? The life-change story is in the composition, not the volume. Without normalization years with more data would distort the platform migration narrative. (IBCS — comparable scales for compositional comparison; Tufte — honesty: no volume distortion between years; glance test — migration reads in <5 seconds from the top-left of the visual)", "framework": "IBCS — normalization; Tufte — honesty; glance test", "costWarning": "Use a maximum of 6-7 distinct colours for the platform_group series. 'Not Applicable' and 'Other' groups should be merged or excluded if they individually represent <5% to avoid fragmenting the legend.", "binding": {"projections": [{"role": "Category", "kind": "Column", "entity": "dim_calendar", "property": "year", "displayName": "Year"}, {"role": "Series", "kind": "Column", "entity": "dim_platform", "property": "platform_group", "displayName": "Platform"}, {"role": "Y", "kind": "Measure", "entity": "formulas", "property": "# Total Hours Played", "displayName": "Hours"}], "sort": [{"kind": "Column", "entity": "dim_calendar", "property": "year", "direction": "Ascending"}]}}, {"visualId": "p5n06", "visualType": "barChart", "recommendedVisualType": "barChart", "metric": "# Total Hours Played × device_brand", "message": "Which device brands dominated my listening? — Apple vs. Samsung vs. Sony vs. Google.", "positionHint": {"col": 7, "row": 3, "colSpan": 5, "rowSpan": 4}, "justification": "Sorted horizontal bars by brand: personal insight into ecosystem loyalty. Apple, Samsung, Sony (PlayStation), Google — each tells a different story. Complements platform_group with the brand dimension. (Knaflic — compare categories → sorted horizontal bars)", "framework": "Knaflic — compare categories", "costWarning": "'Unknown' may dominate if the dim_platform parser didn't resolve some brands — verify in preview and add Power Query rules if necessary.", "binding": {"projections": [{"role": "Category", "kind": "Column", "entity": "dim_platform", "property": "device_brand", "displayName": "Brand"}, {"role": "Y", "kind": "Measure", "entity": "formulas", "property": "# Total Hours Played", "displayName": "Hours"}], "sort": [{"kind": "Measure", "entity": "formulas", "property": "# Total Hours Played", "direction": "Descending"}]}}, {"visualId": "p5n07", "visualType": "hundredPercentStackedColumnChart", "recommendedVisualType": "hundredPercentStackedColumnChart", "metric": "# Total Hours Played × year × device_type", "message": "Mobile vs. Desktop vs. TV/Cast vs. Console: device type evolution year by year.", "positionHint": {"col": 7, "row": 7, "colSpan": 5, "rowSpan": 5}, "costWarning2": "This chart's Category axis is device_type — do not add a device_type slicer on this page (see interactivity.designNote); it would collapse this visual to a single bar.", "justification": "Complements the platform_group 100% stacked (horizontal) with the higher-level device_type abstraction (Mobile/Desktop/Console/TV). The vertical orientation visually contrasts with the main horizontal chart, signalling these are different levels of analysis. Only 5 device_type values = 5 easily distinguishable colours. (IBCS — normalization; Gestalt — similarity with main platform visual but differentiated by orientation)", "framework": "IBCS — normalization; Gestalt — similarity + differentiation by orientation", "costWarning": "", "binding": {"projections": [{"role": "Category", "kind": "Column", "entity": "dim_calendar", "property": "year", "displayName": "Year"}, {"role": "Series", "kind": "Column", "entity": "dim_platform", "property": "device_type", "displayName": "Device Type"}, {"role": "Y", "kind": "Measure", "entity": "formulas", "property": "# Total Hours Played", "displayName": "Hours"}], "sort": [{"kind": "Column", "entity": "dim_calendar", "property": "year", "direction": "Ascending"}]}}]}]};

const state={page:0, view:"propuesto", selKey:null, bookmarkByPage:{}};

// resolve the active bookmark object for a page: explicit click > first default:true > first bookmark > null
function activeBookmark(page){
  const bks=(page.interactivity&&page.interactivity.bookmarks)||[];
  if(!bks.length) return null;
  const picked=state.bookmarkByPage[state.page];
  if(picked){ const f=bks.find(b=>(b.name||"")===picked); if(f) return f; }
  return bks.find(b=>b.default)||bks[0];
}
// a visual with no bookmarkGroup is always shown; one WITH a group is hidden only if the
// active bookmark's hideGroups names it (so pages with groups but no matching bookmark still render everything)
function visibleUnderBookmark(v,page){
  if(!v.bookmarkGroup) return true;
  const bk=activeBookmark(page);
  if(!bk) return true;
  return !((bk.hideGroups||[]).includes(v.bookmarkGroup));
}

function palette(){
  const ds=((PROPOSAL&&PROPOSAL.report&&PROPOSAL.report.designSystem)||{}).palette||{};
  const p=Object.assign({}, DEF_PAL, ds);
  if(!Array.isArray(p.series)||!p.series.length) p.series=DEF_PAL.series;
  return p;
}
// deterministic 0..1 pseudo-random seeded by a string (no Math.random -> stable output)
function seedRand(str){
  let h=2166136261>>>0;
  for(let i=0;i<str.length;i++){ h^=str.charCodeAt(i); h=Math.imul(h,16777619)>>>0; }
  return ()=>{ h+=0x6D2B79F5; let t=h; t=Math.imul(t^(t>>>15),1|t); t^=t+Math.imul(t^(t>>>7),61|t); return ((t^(t>>>14))>>>0)/4294967296; };
}
function synthSeries(seed,n,lo,hi){ const r=seedRand(seed),a=[]; for(let i=0;i<n;i++) a.push(lo+(hi-lo)*r()); return a; }

function el(tag,props,kids){
  const e=document.createElement(tag);
  if(props) for(const k in props){ const v=props[k];
    if(k==="style") Object.assign(e.style,v);
    else if(k==="class") e.className=v;
    else if(k==="text") e.textContent=v;
    else if(k.slice(0,2)==="on") e.addEventListener(k.slice(2),v);
    else if(v!=null) e.setAttribute(k,v);
  }
  (kids||[]).forEach(c=>{ if(c==null) return; e.appendChild(typeof c==="object"?c:document.createTextNode(String(c))); });
  return e;
}
function sv(tag,attrs,kids){
  const e=document.createElementNS(SVGNS,tag);
  if(attrs) for(const k in attrs){ if(attrs[k]!=null) e.setAttribute(k,attrs[k]); }
  (kids||[]).forEach(c=>{ if(c!=null) e.appendChild(c); });
  return e;
}
function svText(s,attrs){ const t=sv("text",attrs); t.textContent=s; return t; } // textContent => safe

function proposalPages(){ return (PROPOSAL&&PROPOSAL.pages)||[]; }
function curPage(){ return proposalPages()[state.page]||{visuals:[]}; }
function invByPageId(){ const m={}; if(INVENTORY&&INVENTORY.pages) INVENTORY.pages.forEach(p=>{m[p.pageId]=p;}); return m; }

function resolvePos(v,idx){
  const p=v.position;
  if(p&&(+p.width>0||+p.height>0)) return {x:+p.x||0,y:+p.y||0,w:+p.width||0,h:+p.height||0,z:+p.z||idx};
  const h=v.positionHint;
  if(h) return {x:(+h.col||0)/12*CANVAS_W,y:(+h.row||0)*60,w:(+h.colSpan||3)/12*CANVAS_W,h:(+h.rowSpan||1)*60,z:idx};
  const col=idx%2,row=Math.floor(idx/2);
  return {x:16+col*623,y:162+row*0,w:605,h:540,z:idx};
}
function vType(v){ return v.visualType||v.recommendedVisualType||""; }
function vLabel(v){ return v.title||v.metric||v.roleSummary||v.message||vType(v); }

// ----- SVG preview renderers (synthetic data) ------------------------------ #
function drawCard(svg,w,h,v,pal){
  svg.appendChild(sv("rect",{x:0,y:0,width:w,height:h,rx:6,fill:pal.background}));
  svg.appendChild(sv("rect",{x:0,y:0,width:5,height:h,fill:pal.accent}));
  const label=vLabel(v), r=seedRand(v.visualId||label);
  const val=Math.round(10+r()*990);
  svg.appendChild(svText(label,{x:14,y:h*0.40,fill:pal.text,"font-size":Math.min(13,h*0.18),"font-family":"Segoe UI,Arial"}));
  svg.appendChild(svText(String(val),{x:14,y:h*0.82,fill:pal.text,"font-size":Math.min(34,h*0.46),"font-weight":"700","font-family":"Segoe UI,Arial"}));
}
function chartFrame(svg,w,h,v,pal){
  svg.appendChild(sv("rect",{x:0,y:0,width:w,height:h,rx:6,fill:pal.background,stroke:"rgba(255,255,255,.15)"}));
  svg.appendChild(svText(vLabel(v),{x:12,y:20,fill:pal.text,"font-size":13,"font-weight":"600","font-family":"Segoe UI,Arial"}));
  return {x0:14,y0:32,x1:w-14,y1:h-22};
}
function drawColumns(svg,w,h,v,pal,stacked){
  const a=chartFrame(svg,w,h,v,pal); const n=6, groups=stacked?3:2;
  const bw=(a.x1-a.x0)/n, gap=bw*0.18;
  for(let i=0;i<n;i++){
    const x=a.x0+i*bw+gap/2, bw2=bw-gap;
    if(stacked){
      let yacc=a.y1; const parts=synthSeries((v.visualId||"")+i,groups,.2,1);
      const tot=parts.reduce((s,x)=>s+x,0);
      parts.forEach((p,k)=>{ const ph=(a.y1-a.y0)*(p/tot); yacc-=ph;
        svg.appendChild(sv("rect",{x,y:yacc,width:bw2,height:ph,fill:pal.series[k%pal.series.length]})); });
    } else {
      const sw=bw2/groups, vals=synthSeries((v.visualId||"")+i,groups,.25,1);
      vals.forEach((val,k)=>{ const bh=(a.y1-a.y0)*val;
        svg.appendChild(sv("rect",{x:x+k*sw,y:a.y1-bh,width:sw-2,height:bh,fill:pal.series[k%pal.series.length]})); });
    }
  }
  svg.appendChild(sv("line",{x1:a.x0,y1:a.y1,x2:a.x1,y2:a.y1,stroke:"rgba(255,255,255,.3)"}));
}
function drawBars(svg,w,h,v,pal){
  const a=chartFrame(svg,w,h,v,pal); const n=7;
  const vals=synthSeries(v.visualId||"bars",n,.25,1).sort((x,y)=>y-x);
  const bh=(a.y1-a.y0)/n;
  vals.forEach((val,i)=>{ const y=a.y0+i*bh+bh*0.15, len=(a.x1-a.x0-60)*val;
    svg.appendChild(sv("rect",{x:a.x0+60,y,width:len,height:bh*0.7,fill:i===0?pal.accent:pal.series[0]}));
    svg.appendChild(svText("Item "+(i+1),{x:a.x0,y:y+bh*0.5,fill:pal.text,"font-size":9,"font-family":"Segoe UI,Arial"}));
  });
}
function drawLine(svg,w,h,v,pal){
  const a=chartFrame(svg,w,h,v,pal); const n=6;
  for(let s=0;s<2;s++){
    const vals=synthSeries((v.visualId||"line")+"_"+s,n,.2,1);
    const pts=vals.map((val,i)=>[a.x0+i*((a.x1-a.x0)/(n-1)), a.y1-(a.y1-a.y0)*val]);
    svg.appendChild(sv("polyline",{points:pts.map(p=>p[0]+","+p[1]).join(" "),fill:"none",
      stroke:pal.series[s%pal.series.length],"stroke-width":2.5}));
    pts.forEach(p=>svg.appendChild(sv("circle",{cx:p[0],cy:p[1],r:3,fill:pal.series[s%pal.series.length]})));
  }
  svg.appendChild(sv("line",{x1:a.x0,y1:a.y1,x2:a.x1,y2:a.y1,stroke:"rgba(255,255,255,.3)"}));
}
function drawTable(svg,w,h,v,pal){
  svg.appendChild(sv("rect",{x:0,y:0,width:w,height:h,rx:6,fill:pal.background,stroke:"rgba(255,255,255,.15)"}));
  svg.appendChild(svText(vLabel(v),{x:12,y:20,fill:pal.text,"font-size":13,"font-weight":"600","font-family":"Segoe UI,Arial"}));
  const cols=4, rows=Math.max(3,Math.min(8,Math.floor((h-40)/22))), x0=12, y0=32, cw=(w-24)/cols, rh=(h-40)/rows;
  svg.appendChild(sv("rect",{x:x0,y:y0,width:w-24,height:rh,fill:"rgba(255,255,255,.08)"}));
  for(let c=0;c<cols;c++) svg.appendChild(svText("Col "+(c+1),{x:x0+c*cw+4,y:y0+rh*0.7,fill:pal.accent,"font-size":10,"font-family":"Segoe UI,Arial"}));
  for(let rI=1;rI<rows;rI++){ const y=y0+rI*rh;
    svg.appendChild(sv("line",{x1:x0,y1:y,x2:w-12,y2:y,stroke:"rgba(255,255,255,.12)"}));
    for(let c=0;c<cols;c++) svg.appendChild(svText("·····",{x:x0+c*cw+4,y:y+rh*0.7,fill:pal.text,"font-size":10,"font-family":"Segoe UI,Arial"}));
  }
}
function drawGeneric(svg,w,h,v,pal){
  chartFrame(svg,w,h,v,pal);
  svg.appendChild(svText(vType(v)||"visual",{x:w/2,y:h/2,fill:"rgba(255,255,255,.5)","font-size":12,"text-anchor":"middle","font-family":"Segoe UI,Arial"}));
}
function renderVisualSVG(box,w,h,v,pal){
  const svg=sv("svg",{viewBox:"0 0 "+w+" "+h,preserveAspectRatio:"none"});
  const t=vType(v);
  if(t==="cardVisual"||t==="card"||t==="multiRowCard") drawCard(svg,w,h,v,pal);
  else if(t==="lineChart"||t==="areaChart") drawLine(svg,w,h,v,pal);
  else if(t==="barChart"||t==="stackedBarChart"||t==="hundredPercentStackedBarChart"||t==="clusteredBarChart") drawBars(svg,w,h,v,pal);
  else if(t==="clusteredColumnChart") drawColumns(svg,w,h,v,pal,false);
  else if(t==="columnChart"||t==="hundredPercentStackedColumnChart") drawColumns(svg,w,h,v,pal,true);
  else if(t==="tableEx"||t==="pivotTable") drawTable(svg,w,h,v,pal);
  else drawGeneric(svg,w,h,v,pal);
  box.appendChild(svg);
}

function makeVisual(v,idx,pal,opts){
  opts=opts||{};
  const pos=resolvePos(v,idx);
  const box=el("div",{class:"visual"+(opts.selKey===state.selKey?" sel":""),tabindex:"0"});
  box.style.left=(pos.x/CANVAS_W*100)+"%"; box.style.top=(pos.y/CANVAS_H*100)+"%";
  box.style.width=(pos.w/CANVAS_W*100)+"%"; box.style.height=(pos.h/CANVAS_H*100)+"%";
  box.style.zIndex=pos.z||idx;
  // render at the real pixel size for crisp proportions
  renderVisualSVG(box,Math.max(40,pos.w),Math.max(30,pos.h),v,pal);
  if(opts.verdict){ const c=VERDICT_COLORS[opts.verdict]||"#666";
    box.appendChild(el("span",{class:"ribbon",style:{background:c},text:opts.verdict})); }
  const act=()=>{ state.selKey=opts.selKey; render(); };
  box.addEventListener("click",act);
  box.addEventListener("keydown",e=>{ if(e.key==="Enter"||e.key===" "){e.preventDefault();act();} });
  return box;
}

function renderInteractivity(canvas,page,pal){
  const inter=page.interactivity||{};
  (inter.slicers||[]).forEach((sl,i)=>{
    const chip=el("div",{class:"chip slicer"},[ (sl.displayName||sl.field||"Slicer"),
      el("span",{class:"caret",text:"▾"}) ]);
    chip.style.right=(8+i*4)+"px"; chip.style.top="6px";
    if(sl.default) chip.title="Default: "+sl.default;
    canvas.appendChild(chip);
  });
  let bx=10;
  const active=activeBookmark(page);
  (inter.bookmarks||[]).forEach(bk=>{
    const isOn=active&&(bk.name===active.name);
    const chip=el("div",{class:"chip bm"+(isOn?" on":""),text:bk.name||"Bookmark",
      onclick:()=>{ state.bookmarkByPage[state.page]=bk.name; state.selKey=null; render(); }});
    chip.style.left=bx+"px"; chip.style.top="6px"; bx+=Math.max(70,(bk.name||"").length*8+24);
    if(bk.filter) chip.title=bk.filter;
    canvas.appendChild(chip);
  });
  const nav=inter.navigation;
  if(nav&&nav.showTitle){
    const t=el("div",{class:"chip nav",text:page.title||"Page"}); t.style.left="10px"; t.style.bottom="8px";
    canvas.appendChild(t);
  }
}

function renderCanvas(){
  const pal=palette();
  const canvas=el("div",{id:"canvas"});
  canvas.style.background=pal.background;
  const ppage=curPage();
  const isRevisar=(MODE==="revisar");
  if(isRevisar&&state.view==="actual"){
    const inv=invByPageId()[ppage.pageId];
    if(!inv||!(inv.visuals||[]).length){
      canvas.appendChild(el("div",{style:{position:"absolute",inset:"0",display:"flex",alignItems:"center",
        justifyContent:"center",color:"rgba(255,255,255,.6)",fontSize:"13px",textAlign:"center",padding:"20px"},
        text:"Página nueva o sin equivalente actual — no hay estado previo que mostrar."}));
      return canvas;
    }
    inv.visuals.forEach((v,i)=>canvas.appendChild(makeVisual(v,i,pal,{selKey:"actual:"+ppage.pageId+":"+(v.visualId||i)})));
  } else {
    (ppage.visuals||[]).forEach((v,i)=>{
      if(!visibleUnderBookmark(v,ppage)) return;
      canvas.appendChild(makeVisual(v,i,pal,{verdict:isRevisar?v.verdict:null,selKey:"prop:"+state.page+":"+(v.visualId||i)}));
    });
    renderInteractivity(canvas,ppage,pal);
  }
  return canvas;
}

function detailRow(label,value){
  if(value==null||value==="") return null;
  return el("div",{class:"row"},[el("span",{class:"lbl",text:label}),el("span",{text:value})]);
}
function renderDetail(){
  const d=el("aside",{id:"detail"});
  const ppage=curPage(), isRevisar=(MODE==="revisar");
  let v=null, fromActual=false;
  if(state.selKey){
    if(state.selKey.indexOf("actual:")===0){
      fromActual=true; const inv=invByPageId()[ppage.pageId];
      const vid=state.selKey.split(":").slice(2).join(":");
      v=((inv&&inv.visuals)||[]).find(x=>(x.visualId||"")==vid)||null;
    } else {
      v=(ppage.visuals||[]).find((x,idx)=>("prop:"+state.page+":"+(x.visualId||idx))===state.selKey)||null;
    }
  }
  if(!v){ d.appendChild(el("h3",{text:"Detalle"}));
    d.appendChild(el("div",{class:"empty",text:"Haz clic en un visual para ver el porqué."})); return d; }
  d.appendChild(el("h3",{text:vType(v)||"Visual"}));
  if(isRevisar&&v.verdict){ const c=VERDICT_COLORS[v.verdict]||"#666";
    d.appendChild(el("span",{class:"pill",style:{background:c},text:v.verdict})); }
  d.appendChild(detailRow("Métrica",v.metric));
  d.appendChild(detailRow("Mensaje",v.message||v.roleSummary));
  if(isRevisar){ d.appendChild(detailRow("Razón",v.reason)); d.appendChild(detailRow("Qué se pierde",v.whatLost)); }
  d.appendChild(detailRow("Justificación",v.justification));
  d.appendChild(detailRow("Marco",v.framework));
  if(v.costWarning) d.appendChild(el("div",{class:"row cost"},[el("span",{class:"lbl",text:"Costo / antipatrón"}),el("span",{text:v.costWarning})]));
  const b=v.binding;
  if(b&&b.projections){
    const lines=b.projections.map(p=>(p.role||"?")+": "+(p.entity||"")+"."+(p.property||"")+" ["+(p.kind||"Measure")+"]");
    d.appendChild(el("div",{class:"row bind"},[el("span",{class:"lbl",text:"Binding (build)"}),
      el("div",{},[document.createTextNode(lines.join("  •  "))])]));
  } else if(!fromActual){
    d.appendChild(el("div",{class:"row"},[el("span",{class:"lbl",text:"Binding (build)"}),
      el("span",{class:"empty",text:"sin binding — solo mockup (no se construye)"})]));
  }
  return d;
}

function renderTabs(){
  const nav=el("nav",{id:"tabs"});
  proposalPages().forEach((p,i)=>nav.appendChild(el("button",{class:(i===state.page?"on":""),
    text:p.title||p.displayName||("Página "+(i+1)),onclick:()=>{state.page=i;state.selKey=null;render();}})));
  return nav;
}
function renderHeader(){
  const rep=(PROPOSAL&&PROPOSAL.report)||{};
  const h=el("header",{},[el("h1",{text:rep.title||"Mockup de reporte"})]);
  if(rep.throughLine) h.appendChild(el("div",{class:"bajada",text:"Hilo conductor: "+rep.throughLine}));
  const bits=[]; if(rep.audience) bits.push("Audiencia: "+rep.audience); if(rep.framework) bits.push("Marco: "+rep.framework);
  if(bits.length) h.appendChild(el("div",{class:"meta",text:bits.join("  ·  ")}));
  if(MODE==="revisar"){
    const t=el("div",{class:"toggle"});
    t.appendChild(el("button",{class:(state.view==="actual"?"on":""),text:"Actual",onclick:()=>{state.view="actual";state.selKey=null;render();}}));
    t.appendChild(el("button",{class:(state.view==="propuesto"?"on":""),text:"Propuesto",onclick:()=>{state.view="propuesto";state.selKey=null;render();}}));
    h.appendChild(t);
  }
  return h;
}
function renderPageMeta(){
  const p=curPage(), m=el("div",{class:"pagemeta"});
  m.appendChild(el("div",{class:"title",text:(p.title||"Página "+(state.page+1))+(MODE==="revisar"?("  —  "+(state.view==="actual"?"estado ACTUAL":"propuesta")):"")}));
  if(p.takeaway) m.appendChild(el("div",{class:"takeaway",text:"Takeaway: "+p.takeaway}));
  const sub=[]; if(p.decision) sub.push("Decisión: "+p.decision);
  if(p.layoutPreset) sub.push("Layout: "+p.layoutPreset);
  if(sub.length) m.appendChild(el("div",{class:"decision",text:sub.join("  ·  ")}));
  return m;
}
function renderLegend(){
  if(MODE!=="revisar") return null;
  const lg=el("div",{class:"legend"});
  Object.keys(VERDICT_COLORS).forEach(k=>lg.appendChild(el("span",{},[el("i",{style:{background:VERDICT_COLORS[k]}}),document.createTextNode(k)])));
  return lg;
}
function render(){
  const app=document.getElementById("app"); app.textContent="";
  app.appendChild(renderHeader());
  app.appendChild(renderTabs());
  const main=el("div",{class:"main"});
  const stage=el("div",{id:"stage"});
  stage.appendChild(renderPageMeta());
  stage.appendChild(renderCanvas());
  main.appendChild(stage);
  main.appendChild(renderDetail());
  app.appendChild(main);
  const lg=renderLegend(); if(lg) app.appendChild(lg);
  app.appendChild(el("div",{class:"note",text:"Vista previa con datos SINTÉTICOS (formas y proporciones ilustrativas, "
    +"no valores reales) sobre coordenadas reales 1280×720. Es apoyo de diseño, no el render del reporte."}));
}
render();
</script></body></html>
